name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare compose env
        run: |
          cp env.example docker/.env
          # Skip model downloads in CI – model-init exits immediately if MODELS is empty
          echo "MODELS=" >> docker/.env
          # Create ephemeral secrets required by docker-compose secret file mounts
          mkdir -p docker/.secrets
          python - <<'PY'
          import secrets
          from pathlib import Path

          secret_dir = Path("docker/.secrets")
          (secret_dir / "litellm_master_key").write_text(f"sk-{secrets.token_hex(32)}\n", encoding="utf-8")
          (secret_dir / "webui_secret_key").write_text(f"{secrets.token_hex(32)}\n", encoding="utf-8")
          PY
          # Guard: fail early with debug output if required secret files are missing
          for secret_file in litellm_master_key webui_secret_key; do
            if [ ! -f "docker/.secrets/$secret_file" ]; then
              echo "❌ Missing required secret file: docker/.secrets/$secret_file"
              echo "Contents of docker/.secrets for debugging:"
              ls -la docker/.secrets || true
              exit 1
            fi
          done
          echo "Secret file sizes (bytes):"
          for secret_file in litellm_master_key webui_secret_key; do
            file_size=$(wc -c < "docker/.secrets/$secret_file" | tr -d '[:space:]')
            echo "  - $secret_file: $file_size"
            if [ "$file_size" -le 0 ]; then
              echo "❌ Secret file is empty: docker/.secrets/$secret_file"
              exit 1
            fi
          done

      - name: Compose preflight (config resolve)
        run: |
          docker compose -f docker/docker-compose.yml --env-file docker/.env config > /dev/null
          echo "✅ docker compose config resolved successfully"
          echo "Resolved services:"
          docker compose -f docker/docker-compose.yml --env-file docker/.env config --services
          echo "Resolved images:"
          docker compose -f docker/docker-compose.yml --env-file docker/.env config --images

      - name: Start services
        run: |
          docker compose -f docker/docker-compose.yml --env-file docker/.env up -d --build

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for services to become healthy..."
          for service in ollama litellm open-webui; do
            echo "Checking $service..."
            for i in $(seq 1 30); do
              status=$(docker inspect --format='{{.State.Health.Status}}' \
                $(docker compose -f docker/docker-compose.yml --env-file docker/.env ps -q $service) 2>/dev/null || echo "unknown")
              if [ "$status" = "healthy" ]; then
                echo "  ✅ $service is healthy"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "  ❌ $service did not become healthy in time"
                docker compose -f docker/docker-compose.yml --env-file docker/.env logs $service
                exit 1
              fi
              echo "  ⏳ $service status: $status (attempt $i/30)"
              sleep 5
            done
          done

      - name: Run smoke test
        shell: pwsh
        run: ./scripts/smoke-test.ps1 -MaxAttempts 1 -DelaySeconds 0

      - name: Print service logs on failure
        if: failure()
        run: |
          docker compose -f docker/docker-compose.yml --env-file docker/.env logs
