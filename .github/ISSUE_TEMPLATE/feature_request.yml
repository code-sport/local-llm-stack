name: ✨ Feature Request
description: Suggest a new feature or enhancement
title: "[FEATURE] "
labels: ["enhancement", "triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Help us understand what you need.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
      placeholder: "I'm trying to... but currently..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work?
      placeholder: "The feature should..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches or workarounds
      placeholder: "We could also..."

  - type: textarea
    id: examples
    attributes:
      label: Usage Examples
      description: How would users interact with this feature?
      render: bash
      placeholder: |
        ```
        docker compose ... --enable-feature-x
        ```

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, links, references
      placeholder: "Related issues: #123"
