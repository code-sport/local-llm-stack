general_settings:
  # Require a bearer token on every request to LiteLLM.
  # Set LITELLM_MASTER_KEY in docker/.env to a long random string.
  # All clients (Open WebUI, SDK, curl) must send: Authorization: Bearer <key>
  master_key: "os.environ/LITELLM_MASTER_KEY"

  # Maximum concurrent in-flight requests across all models.
  # Protects the host from being overwhelmed during parallel usage.
  max_parallel_requests: "os.environ/LITELLM_MAX_PARALLEL_REQUESTS"

model_list:
  # 🧠 High-End (Opus Ersatz)
  - model_name: deepseek-v4
    litellm_params:
      model: ollama/deepseek-v4-flash
      api_base: "os.environ/OLLAMA_API_BASE"

  # ⚖️ Standard Chat (Sonnet)
  - model_name: chat
    litellm_params:
      model: ollama/llama3
      api_base: "os.environ/OLLAMA_API_BASE"

  # ⚡ Fast (Haiku)
  - model_name: fast
    litellm_params:
      model: ollama/phi3
      api_base: "os.environ/OLLAMA_API_BASE"

  # 💻 Coding Model
  - model_name: coder
    litellm_params:
      model: ollama/deepseek-coder
      api_base: "os.environ/OLLAMA_API_BASE"

router_settings:
  routing_strategy: usage-based-routing
  # Global requests-per-minute cap. Prevents runaway scripts from
  # saturating the local GPU/CPU. Adjust in docker/.env via LITELLM_RPM_LIMIT.
  rpm_limit: "os.environ/LITELLM_RPM_LIMIT"
  # Global tokens-per-minute cap.
  tpm_limit: "os.environ/LITELLM_TPM_LIMIT"
