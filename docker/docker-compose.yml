name: ${COMPOSE_PROJECT_NAME:-claude-local-stack}

services:
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.11.6}
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - "${OLLAMA_BIND:-127.0.0.1}:${OLLAMA_PORT:-11434}:${OLLAMA_PORT:-11434}"
    volumes:
      - ollama:/root/.ollama

    environment:
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-2}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-2}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-}

    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: ${OLLAMA_HEALTHCHECK_INTERVAL:-5s}
      retries: ${OLLAMA_HEALTHCHECK_RETRIES:-10}

    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEMORY_LIMIT:-12g}
          cpus: "${OLLAMA_CPU_LIMIT:-4.0}"

  model-init:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.11.6}
    depends_on:
      ollama:
        condition: service_healthy

    volumes:
      - ollama:/root/.ollama

    environment:
      - OLLAMA_HOST=http://ollama:${OLLAMA_PORT:-11434}
      - MODELS=${MODELS:-deepseek-v4-flash deepseek-coder llama3 phi3}

    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      set -eu
      for MODEL in $$MODELS; do
        if ollama list | grep -q \"$$MODEL\"; then
          echo \"✅ $$MODEL already present\";
        else
          echo \"⬇️ Pulling $$MODEL\";
          ollama pull $$MODEL || { echo \"❌ Failed to pull $$MODEL\"; exit 1; };
        fi
      done
      "

    restart: ${MODEL_INIT_RESTART:-"no"}

  # LiteLLM with routing
  litellm:
    build:
      context: .
      dockerfile: litellm.Dockerfile
    image: ${LITELLM_IMAGE:-claude-local-stack-litellm:local}
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - "${LITELLM_BIND:-127.0.0.1}:${LITELLM_PORT:-4000}:${LITELLM_PORT:-4000}"

    environment:
      # LITELLM_MASTER_KEY is injected via /run/secrets/litellm_master_key (see secrets: below)
      - OLLAMA_API_BASE=http://ollama:${OLLAMA_PORT:-11434}
      - LITELLM_MAX_PARALLEL_REQUESTS=${LITELLM_MAX_PARALLEL_REQUESTS:-10}
      - LITELLM_RPM_LIMIT=${LITELLM_RPM_LIMIT:-60}
      - LITELLM_TPM_LIMIT=${LITELLM_TPM_LIMIT:-100000}

    secrets:
      - litellm_master_key

    depends_on:
      ollama:
        condition: service_healthy
      model-init:
        condition: service_completed_successfully

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:${LITELLM_PORT:-4000}/health/liveliness', timeout=5)\" || exit 1",
        ]
      interval: ${LITELLM_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${LITELLM_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${LITELLM_HEALTHCHECK_RETRIES:-12}

    deploy:
      resources:
        limits:
          memory: ${LITELLM_MEMORY_LIMIT:-1g}
          cpus: "${LITELLM_CPU_LIMIT:-2.0}"

  # Open WebUI (Claude-like frontend)
  open-webui:
    image: ${WEBUI_IMAGE:-ghcr.io/open-webui/open-webui:v0.6.27}
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - "${WEBUI_BIND:-127.0.0.1}:${WEBUI_PORT:-3000}:${WEBUI_CONTAINER_PORT:-8080}"

    environment:
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-http://litellm:4000}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-dummy}
      - WEBUI_AUTH=${WEBUI_AUTH:-true}
      # Disabled by default for production safety — enable only for initial onboarding.
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-false}
      # WEBUI_SECRET_KEY is injected via /run/secrets/webui_secret_key (see secrets: below)
      # --- Memory reduction: disable unused heavy features ---
      # We route through our own LiteLLM container; built-in proxy not needed.
      - ENABLE_LITELLM=${ENABLE_LITELLM:-false}
      # RAG web search loads additional ML libraries into RAM.
      - ENABLE_RAG_WEB_SEARCH=${ENABLE_RAG_WEB_SEARCH:-false}
      # Image generation pulls ComfyUI/A1111 clients into memory.
      - ENABLE_IMAGE_GENERATION=${ENABLE_IMAGE_GENERATION:-false}
      # Code execution starts a Jupyter kernel process.
      - ENABLE_CODE_EXECUTION=${ENABLE_CODE_EXECUTION:-false}
      # Community sharing makes outbound API calls at startup.
      - ENABLE_COMMUNITY_SHARING=${ENABLE_COMMUNITY_SHARING:-false}
      # Task model auto-loading reserves an extra model slot in Ollama.
      - TASK_MODEL=${TASK_MODEL:-}
      - TASK_MODEL_EXTERNAL=${TASK_MODEL_EXTERNAL:-}
      # Disable STT engine to avoid loading audio libraries.
      - AUDIO_STT_ENGINE=${AUDIO_STT_ENGINE:-}

    secrets:
      - webui_secret_key

    entrypoint:
      - "/bin/sh"
      - "-c"
      - "export WEBUI_SECRET_KEY=$(cat /run/secrets/webui_secret_key) && exec bash start.sh"

    depends_on:
      litellm:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:${WEBUI_CONTAINER_PORT:-8080}', timeout=5)\" || exit 1",
        ]
      interval: ${WEBUI_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${WEBUI_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${WEBUI_HEALTHCHECK_RETRIES:-12}

    volumes:
      # Open WebUI stores its own app data here inside the container; this is not a project backend.
      - open-webui:/app/backend/data

    deploy:
      resources:
        limits:
          memory: ${WEBUI_MEMORY_LIMIT:-512m}
          cpus: "${WEBUI_CPU_LIMIT:-1.0}"

volumes:
  ollama:
  open-webui:

secrets:
  litellm_master_key:
    file: ${SECRETS_DIR}/litellm_master_key
  webui_secret_key:
    file: ${SECRETS_DIR}/webui_secret_key
